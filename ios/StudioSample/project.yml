name: dream crates
options:
  bundleIdPrefix: com.dreamcrates
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  StudioSampleApp:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/StudioSampleApp/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - fetch
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        CFBundleDisplayName: "Dream Crates"
        NSHumanReadableCopyright: "Copyright © 2026 deepdream llc"
        NSUserTrackingUsageDescription: "Dream Crates does not track you across apps."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dreamcrates.studiosample
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets:
        - StudioSampleTests
  StudioSampleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: StudioSampleApp
